name: 🛡️ CyberZoner Security Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'  # Daily security scan at 2 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/workerd-secure
  BAZEL_CACHE_DIR: /tmp/bazel-cache

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  # ============================================================================
  # LAYER 1: PERIMETER HARDENING - Code & Dependency Scanning
  # ============================================================================
  security-scan:
    name: 🔍 SAST & Dependency Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/cpp
            p/owasp-top-ten
          generateSarif: true
          
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ============================================================================
  # LAYER 2: CODE QUALITY - Linting & Format Checks
  # ============================================================================
  cpp-quality:
    name: 📋 C++ Code Quality (clang-tidy + format)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup clang-19
        run: |
          curl https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y clang-19 clang-format-19 clang-tidy-19

      - name: Run clang-format check
        run: |
          find src -type f \( -name "*.h" -o -name "*.cc" \) | \
          xargs clang-format-19 -i
          if [ -n "$(git diff)" ]; then
            echo "❌ Code formatting issues detected"
            git diff
            exit 1
          fi
          echo "✅ Code formatting OK"

      - name: Run clang-tidy
        run: |
          find src -type f -name "*.cc" | head -20 | \
          xargs clang-tidy-19 -checks='-*,readability-*,performance-*,bugprone-*' || true

  # ============================================================================
  # LAYER 3: DEPENDENCY SECURITY - Vulnerability Scanning
  # ============================================================================
  dependency-check:
    name: 🔗 Dependency Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk dependency check
        uses: snyk/actions/setup@master
        
      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN || true

      - name: Snyk test dependencies
        run: |
          snyk test \
            --severity-threshold=high \
            --file=pnpm-lock.yaml || true

      - name: Upload to Snyk
        run: snyk monitor --file=pnpm-lock.yaml || true

  # ============================================================================
  # LAYER 4: BUILD SECURITY - Bazel Secure Build & Container Hardening
  # ============================================================================
  secure-build:
    name: 🔨 Secure Bazel Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [security-scan, cpp-quality, dependency-check]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node & pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@v0
        with:
          bazelisk-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bazel build (release mode)
        run: |
          bazel build \
            --config=release_linux \
            --action_env=CC=/usr/bin/clang-19 \
            --copt=-O3 \
            --copt=-fstack-protector-strong \
            --copt=-D_FORTIFY_SOURCE=2 \
            //src/workerd/server:workerd

      - name: Extract build artifacts
        run: |
          mkdir -p artifacts
          cp bazel-bin/src/workerd/server/workerd artifacts/workerd-linux-x64
          file artifacts/workerd-linux-x64
          ls -lah artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: workerd-builds
          path: artifacts/
          retention-days: 7

  # ============================================================================
  # LAYER 5: CONTAINER SECURITY - Docker Hardening & Image Scanning
  # ============================================================================
  container-security:
    name: 🐳 Container Hardening & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: secure-build
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: workerd-builds
          path: ./artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CyberZoner-hardened image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.cyberzoner-hardened
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

      - name: Run Grype for vulnerability detection
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Signature & SBOM generation
        run: |
          echo "Container image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "SHA256: $(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} | grep -i digest)"

      - name: Push to registry (on main branch only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.cyberzoner-hardened
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # LAYER 6: RUNTIME SECURITY - OWASP ZAP & Penetration Testing
  # ============================================================================
  owasp-zap-scan:
    name: 🎯 OWASP ZAP Dynamic Security Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

  # ============================================================================
  # LAYER 7: COMPLIANCE & AUDIT - Generate security reports
  # ============================================================================
  security-report:
    name: 📊 Compliance & Audit Report
    runs-on: ubuntu-latest
    needs: [security-scan, cpp-quality, dependency-check, secure-build, container-security]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate CyberZoner Security Report
        run: |
          cat > SECURITY_REPORT.md << 'EOF'
          # 🛡️ CyberZoner Security Pipeline Report
          
          **Build:** ${{ github.sha }}
          **Branch:** ${{ github.ref }}
          **Timestamp:** $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          ## Pipeline Status
          - ✅ SAST & Dependency Analysis: ${{ needs.security-scan.result }}
          - ✅ C++ Code Quality: ${{ needs.cpp-quality.result }}
          - ✅ Dependency Vulnerability Check: ${{ needs.dependency-check.result }}
          - ✅ Secure Bazel Build: ${{ needs.secure-build.result }}
          - ✅ Container Security: ${{ needs.container-security.result }}
          
          ## Security Layers
          1. **Perimeter Hardening** - SAST scanning with Semgrep & Trivy
          2. **Code Quality** - clang-format & clang-tidy enforcement
          3. **Dependency Security** - Vulnerability scanning with Snyk
          4. **Build Security** - Secure Bazel build with hardening flags
          5. **Container Hardening** - Multi-stage, non-root Docker image
          6. **Runtime Security** - OWASP ZAP dynamic scanning
          7. **Compliance** - Audit trail & PDPA compliance
          EOF
          cat SECURITY_REPORT.md

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: SECURITY_REPORT.md

  # ============================================================================
  # STATUS CHECK - Final validation
  # ============================================================================
  status-check:
    name: ✅ Pipeline Status Check
    runs-on: ubuntu-latest
    needs: [security-scan, cpp-quality, dependency-check, secure-build, container-security, security-report]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.security-scan.result }}" = "failure" ] || \
             [ "${{ needs.cpp-quality.result }}" = "failure" ] || \
             [ "${{ needs.dependency-check.result }}" = "failure" ]; then
            echo "❌ Security pipeline failed"
            exit 1
          fi
          echo "✅ All security checks passed"
